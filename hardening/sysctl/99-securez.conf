# SecureZ+ OS — Kernel Security Hardening
# /etc/sysctl.d/99-securez.conf
#
# Applied at boot. These are REAL security controls that harden
# the Linux kernel against common attack vectors.

# ── Network Stack Hardening ──────────────────────────────────

# Disable IP forwarding (not a router)
net.ipv4.ip_forward = 0
net.ipv6.conf.all.forwarding = 0

# Enable strict reverse path filtering (anti-spoofing)
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# Ignore ICMP redirects (prevent MITM route hijacking)
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.secure_redirects = 0
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0

# Don't send ICMP redirects
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# Ignore ICMP broadcasts (smurf attack protection)
net.ipv4.icmp_echo_ignore_broadcasts = 1

# Ignore bogus ICMP error responses
net.ipv4.icmp_ignore_bogus_error_responses = 1

# Enable SYN cookies (SYN flood protection)
net.ipv4.tcp_syncookies = 1

# Disable source routing
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0
net.ipv6.conf.all.accept_source_route = 0

# Log martian packets (impossible source addresses)
net.ipv4.conf.all.log_martians = 1

# Disable IPv6 router advertisements (we're not a router)
net.ipv6.conf.all.accept_ra = 0
net.ipv6.conf.default.accept_ra = 0

# ── Kernel Hardening ─────────────────────────────────────────

# Restrict ptrace to admin-only (per user's security requirement)
# Scope 2 = admin-only. Allows legitimate debugging when needed.
# Better than scope 3 (disabled) which breaks crash reporting.
kernel.yama.ptrace_scope = 2

# Restrict dmesg to root only
kernel.dmesg_restrict = 1

# Restrict access to kernel pointers
kernel.kptr_restrict = 2

# Disable kexec (prevent loading alternative kernels)
kernel.kexec_load_disabled = 1

# Disable SysRq magic keys (prevent console-based attacks)
kernel.sysrq = 0

# Restrict unprivileged user namespaces (reduce attack surface)
# Note: Set to 1 if using Flatpak/bubblewrap without root
kernel.unprivileged_userns_clone = 0

# Enable ASLR (Address Space Layout Randomization)
kernel.randomize_va_space = 2

# Restrict core dumps
fs.suid_dumpable = 0

# Restrict access to perf_event (side-channel attack surface)
kernel.perf_event_paranoid = 3

# ── Memory Hardening ────────────────────────────────────────

# Restrict BPF (Berkeley Packet Filter) to root
kernel.unprivileged_bpf_disabled = 1
net.core.bpf_jit_harden = 2

# Restrict loading of TTY line disciplines
dev.tty.ldisc_autoload = 0

# ── Filesystem Hardening ─────────────────────────────────────

# Restrict creating hard links to files you don't own
fs.protected_hardlinks = 1

# Restrict creating symlinks in sticky directories
fs.protected_symlinks = 1

# Restrict creating FIFOs in sticky directories
fs.protected_fifos = 2

# Restrict creating regular files in sticky directories
fs.protected_regular = 2
